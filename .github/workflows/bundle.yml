# .github/workflows/bundle.yml
#
# "Build bundle" — runs build-bundle.mjs --push on a schedule and on demand.
#
# ⚠  PUSH TRIGGER INTENTIONALLY OMITTED
#    This file only exists on the `main` branch. A `push:` trigger would fire only
#    when `main` itself receives a commit — never for commits pushed to the
#    `backend`, `frontend`, or `cli` orphan branches (those branches don't contain
#    this file). The hourly cron picks up all upstream branch changes automatically.
#
# After .gitmodules is updated to GitHub HTTPS URLs, this workflow is
# fully self-contained. Until then it requires those URLs to be set.

name: Build bundle

on:
  schedule:
    - cron: '0 * * * *'   # every hour on the hour
  workflow_dispatch:        # manual trigger from the Actions UI

permissions:
  contents: write           # push bundle branch + bump main pointer

concurrency:
  group: build-bundle
  cancel-in-progress: false # queue rather than cancel; mid-push cancels corrupt state

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main with submodules
        uses: actions/checkout@v4
        with:
          ref: main
          submodules: true
          fetch-depth: 0          # full history required for non-ff pushes
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          # npm (bundled with Node) is used by build-bundle.mjs → findPkgManager()

      - name: Configure git identity (github-actions[bot])
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Authenticate submodule pushes with GITHUB_TOKEN
        # Rewrites https://github.com/ → authenticated URL so that
        # `git push origin HEAD:bundle` (inside bundle/ submodule) and
        # `git push origin main` (superproject pointer bump) both succeed.
        #
        # NOTE: pushes made via GITHUB_TOKEN do NOT trigger other workflows
        # (GitHub's built-in loop-prevention). To make `docker.yml` fire
        # automatically after every bundle build, replace GITHUB_TOKEN here
        # with a PAT stored in secrets.PUSH_TOKEN.
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf \
            "https://github.com/"

      - name: Build and push bundle
        run: node scripts/build-bundle.mjs --push
