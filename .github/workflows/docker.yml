# .github/workflows/docker.yml
#
# "Build and push image" — builds bundle/Dockerfile and pushes to GHCR.
#
# The `paths: [bundle]` filter watches the bundle SUBMODULE GITLINK (the
# 160000-mode pointer file), not files inside bundle/. This means the workflow
# fires exactly when a new bundle release commit is pinned on main — never on
# every source-code change. It also fires when this workflow file is edited.

name: Build and push image

on:
  push:
    branches: [main]
    paths:
      - bundle                          # submodule gitlink — new bundle pin
      - .github/workflows/docker.yml    # workflow file changes
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # push to GHCR

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout with recursive submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./bundle
          file: ./bundle/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
